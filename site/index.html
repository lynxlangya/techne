:hover{gap:13px}\n.install-link svg{width:14px;height:14px}\n\n/* footer */\n.foot{padding:66px 0 76px}\n.foot-top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:28px;align-items:baseline}\n.foot-links{display:flex;gap:30px}\n.foot-links a{font-size:13.5px;color:var(--muted);transition:color .18s}\n.foot-links a:hover{color:var(--accent-ink)}\n.foot-meta{display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;margin-top:50px;padding-top:26px;border-top:1px solid var(--line)}\n.foot-meta .etym{font-family:var(--serif);font-size:15.5px;color:var(--muted);font-style:italic}\n.foot-meta .lic{font-family:var(--mono);font-size:12px;color:var(--faint)}\n\n.reveal{opacity:1}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============================================================\n     CONFIG — everything human-facing is a {en, zh} leaf.\n     · t({en,zh}) returns the active language.\n     · ADD A SKILL  = append ONE object to SKILLS (both languages in leaves).\n     · ADD A HOST   = append ONE object to HOSTS.\n     Nothing below hardcodes a count; sections render from these arrays.\n     Source-native identifiers (skill names, category slugs, code) are\n     single strings — never translated.\n     ============================================================ -->\n<script id=\"config\">\n/* ---- fixed UI strings (bilingual prose) ---- */\nconst COPY = {\n  navIdea:   {en:\"The idea\",     zh:\"理念\"},\n  navSkills: {en:\"Skills\",       zh:\"技能\"},\n  navHow:    {en:\"How it works\", zh:\"运作方式\"},\n  navInstall:{en:\"Install\",      zh:\"安装\"},\n\n  eyebrow:   {en:\"τέχνη · craft · skill · art\", zh:\"τέχνη · 技艺 · 技能 · 艺术\"},\n  tagline:   {en:\"Skills and agents for the AI era.\",\n              zh:\"为 AI 时代打造的技能与智能体。\"},\n  heroLine:  {en:\"Not knowledge bolted on — a forcing function for the rigorous move the model skips, gated on evidence it can't fake.\",\n              zh:\"不是外挂的知识，而是逼出模型会跳过的那一步严谨动作 —— 并架在它无法伪造的证据上。\"},\n  earlyNote: {en:\"An early, evolving skill library.\",\n              zh:\"一个早期、持续演进的技能库。\"},\n\n  ctaGithub: {en:\"View on GitHub\", zh:\"在 GitHub 查看\"},\n  ctaInstall:{en:\"Install\",        zh:\"安装\"},\n\n  headIdea:  {en:\"The idea\",     zh:\"理念\"},\n  subIdea:   {en:\"Why a skill earns its place.\", zh:\"技能凭什么留下。\"},\n  headSkills:{en:\"Skills\",       zh:\"技能\"},\n  subSkills: {en:\"Each one forces a move, then checks itself against something it can't fake.\",\n              zh:\"每一个都逼出一步动作，再对照它无法伪造的东西自检。\"},\n  headHow:   {en:\"How it works\", zh:\"运作方式\"},\n  subHow:    {en:\"Tool-neutral by design. Adversarial by process.\",\n              zh:\"设计上工具中立，流程上对抗审查。\"},\n  headInstall:{en:\"Install\",     zh:\"安装\"},\n  subInstall:{en:\"Install once, run anywhere.\", zh:\"安装一次，处处可跑。\"},\n\n  forcesLabel:{en:\"forces\", zh:\"逼出\"},\n  gatesLabel: {en:\"gates over\", zh:\"门控于\"},\n  moreSkills: {en:\"More skills are landing.\", zh:\"更多技能陆续登场。\"},\n  moreHint:   {en:\"append one object to SKILLS\", zh:\"向 SKILLS 追加一个对象\"},\n\n  fanCore:    {en:\"one skill body · tool-neutral\", zh:\"一套技能主体 · 工具中立\"},\n  pipeIntro:  {en:\"different parties, before it ships\", zh:\"分属不同方，过审才上线\"},\n\n  installRun: {en:\"read the manifest for your host\", zh:\"按你的宿主读取清单\"},\n  installLink:{en:\"INSTALL.md\", zh:\"INSTALL.md\"},\n\n  footEtym:   {en:\"τέχνη — Greek for craft · skill · art.\",\n              zh:\"τέχνη —— 希腊语：技艺 · 技能 · 艺术。\"},\n  footLicense:{en:\"Open-source on GitHub.\", zh:\"在 GitHub 开源。\"},\n  linkGithub: {en:\"GitHub\", zh:\"GitHub\"},\n  linkInstall:{en:\"Install\", zh:\"安装\"},\n  linkReadme: {en:\"README\", zh:\"README\"},\n  langAria:   {en:\"Language\", zh:\"语言\"},\n};\n\n/* ---- the idea: 3 principle cards. tag is source-native (untranslated). ---- */\nconst PRINCIPLES = [\n  { tag:\"forcing function\", icon:\"⊢\", key:false,\n    body:{en:\"A skill forces a rigorous move the model can already make but routinely skips.\",\n          zh:\"技能逼出一个模型本就会做、却总是跳过的严谨动作。\"} },\n  { tag:\"mechanical check\", icon:\"◇\", key:false,\n    body:{en:\"Each skill checks itself against something it can't fake — a source tree, a run ledger, a git diff, a written brief. Mechanical, not self-reported.\",\n          zh:\"每个技能都对照一样它无法伪造的东西自检 —— 源码树、运行账本、git diff、书面任务书。机械判定，而非自说自话。\"} },\n  { tag:\"改变 ≠ 改善\", icon:\"≠\", key:true,\n    body:{en:\"A skill earns its place only when forcing the move measurably improves the outcome over a plain-model baseline.\",\n          zh:\"只有当强制这一步、相对裸模型基线可量度地改善了结果时，技能才配留下。\"} },\n];\n\n/* ---- how it works: two points (tag source-native) ---- */\nconst WORKFLOW = [\n  { tag:\"one body · multiple skins\",\n    body:{en:\"The skill body is tool-neutral and lives once; every host loads that same body through a thin manifest. Hosts never fork into separate products.\",\n          zh:\"技能主体工具中立、只写一次；每个宿主都通过一层薄壳加载同一份主体。宿主之间从不分叉成不同产品。\"} },\n  { tag:\"non-author adversary\",\n    body:{en:\"Every output faces a non-author adversary: designed, red-teamed, executed, and reviewed by different parties before it ships. Rigor is the product.\",\n          zh:\"每个产出都面对一个非作者对手：设计、红队、执行、评审分属不同方，过审才能上线。严谨本身就是产品。\"} },\n];\n\n/* ---- adversary pipeline steps (bilingual prose) ---- */\nconst STEPS = [\n  {en:\"designed\",   zh:\"设计\"},\n  {en:\"red-teamed\", zh:\"红队\"},\n  {en:\"executed\",   zh:\"执行\"},\n  {en:\"reviewed\",   zh:\"评审\"},\n];\n\n/* ============================================================\n   SKILLS — append ONE object to add a skill (both languages).\n   name & category: source-native, NEVER translated.\n   forces / gatesOver: bilingual {en, zh}.\n   ============================================================ */\nconst SKILLS = [\n  { name:\"anchor-intake\", category:\"general · interrogate\",\n    forces:   {en:\"Interrogate a written engineering brief against a fixed rubric before any work begins.\",\n               zh:\"动工前，拿固定评审表逐条审问一份书面工程任务书。\"},\n    gatesOver:{en:\"the written brief + a fixed rubric\",\n v class=\"sec-num\">02<\u002Fdiv>\n        <div class=\"sec-titles\">\n          <h2 class=\"sec-h\" id=\"h-skills\" data-t=\"headSkills\"><\u002Fh2>\n          <p class=\"sec-sub\" data-t=\"subSkills\"><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"skills\" id=\"skillGrid\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"sec\" id=\"how\" aria-labelledby=\"h-how\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\">\n        <div class=\"sec-num\">03<\u002Fdiv>\n        <div class=\"sec-titles\">\n          <h2 class=\"sec-h\" id=\"h-how\" data-t=\"headHow\"><\u002Fh2>\n          <p class=\"sec-sub\" data-t=\"subHow\"><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"how\" id=\"howGrid\"><\u002Fdiv>\n      <div class=\"seq\" id=\"pipe\" aria-label=\"Review pipeline\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"sec\" id=\"install\" aria-labelledby=\"h-install\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\">\n        <div class=\"sec-num\">04<\u002Fdiv>\n        <div class=\"sec-titles\">\n          <h2 class=\"sec-h\" id=\"h-install\" data-t=\"headInstall\"><\u002Fh2>\n          <p class=\"sec-sub\" data-t=\"subInstall\"><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hosts\" id=\"hostGrid\"><\u002Fdiv>\n      <div class=\"install-row\">\n        <span class=\"install-code\"><span class=\"sigil\">⊢<\u002Fspan><span data-t=\"installRun\"><\u002Fspan><\u002Fspan>\n        <a class=\"install-link\" href=\"\" data-url=\"install\" target=\"_blank\" rel=\"noopener\"><span data-t=\"installLink\">INSTALL.md<\u002Fspan><span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"foot\" aria-label=\"Footer\">\n    <div class=\"wrap\">\n      <div class=\"foot-top\">\n        <a class=\"brand\" href=\"#top\"><span class=\"gr\">τέχνη<\u002Fspan><span class=\"lat\">techne<\u002Fspan><\u002Fa>\n        <nav class=\"foot-links\" aria-label=\"Footer links\">\n          <a href=\"\" data-url=\"github\" data-t=\"linkGithub\" target=\"_blank\" rel=\"noopener\">GitHub<\u002Fa>\n          <a href=\"\" data-url=\"install\" data-t=\"linkInstall\" target=\"_blank\" rel=\"noopener\">Install<\u002Fa>\n          <a href=\"\" data-url=\"readme\" data-t=\"linkReadme\" target=\"_blank\" rel=\"noopener\">README<\u002Fa>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <div class=\"foot-meta\">\n        <span class=\"etym\" data-t=\"footEtym\"><\u002Fspan>\n        <a class=\"lic\" href=\"\" data-url=\"license\" data-t=\"footLicense\" target=\"_blank\" rel=\"noopener\"><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fmain>\n\n<script>\n/* ============================================================\n   i18n ENGINE\n   ============================================================ */\nconst LANGS = [\"en\",\"zh\"];\nlet LANG = \"en\";\nconst t = leaf => (leaf && (leaf[LANG] ?? leaf.en)) || \"\";\nconst $  = s => document.querySelector(s);\nconst $$ = s => [...document.querySelectorAll(s)];\nconst reduced = matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\nlet firstPaint = true;                 // reserved for first-paint-only behaviour\nconst enterCls = () => \"\";             // entrance animation removed for robustness\n\n/* resolve external links once (no auto-navigation) */\n$$(\"[data-url]\").forEach(a => a.setAttribute(\"href\", URLS[a.dataset.url] || \"#\"));\n\n/* ---- static [data-t] strings ---- */\nfunction renderStatic(){\n  $$(\"[data-t]\").forEach(el=>{\n    const c = COPY[el.dataset.t];\n    if(c) el.textContent = t(c);\n  });\n}\n\n/* ---- the idea: numbered editorial statements ---- */\nfunction renderPrinciples(){\n  const wrap = $(\"#principles\"); wrap.innerHTML = \"\";\n  PRINCIPLES.forEach((p,i)=>{\n    const el = document.createElement(\"article\");\n    el.className = \"prin\" + (p.key ? \" key\" : \"\");\n    const rn = String(i+1).padStart(2,\"0\");\n    const tag = p.key ? \"\" : `<div class=\"prin-tag\">${escapeId(p.tag)}<\u002Fdiv>`;\n    const neq = p.key ? `<div class=\"neq\">改变 <em>≠<\u002Fem> 改善<\u002Fdiv>` : \"\";\n    el.innerHTML =\n      `<div class=\"prin-rn\">${rn}<\u002Fdiv>\n       <div class=\"prin-main\">${tag}${neq}<p class=\"prin-body\">${esc(t(p.body))}<\u002Fp><\u002Fdiv>`;\n    wrap.appendChild(el);\n  });\n}\n\n/* ---- skills: data-driven spec rows (any count) ---- */\nfunction renderSkills(){\n  const grid = $(\"#skillGrid\"); grid.innerHTML = \"\";\n  SKILLS.forEach(s=>{\n    const el = document.createElement(\"article\");\n    el.className = \"srow\";\n    el.innerHTML =\n      `<div class=\"s-id\">\n         <div class=\"s-name\"><span class=\"turn\" aria-hidden=\"true\">⊢<\u002Fspan>${escapeId(s.name)}<\u002Fdiv>\n         <div class=\"s-cat\">${escapeId(s.category)}<\u002Fdiv>\n       <\u002Fdiv>\n       <div class=\"s-detail\">\n         <p class=\"s-forces\">${esc(t(s.forces))}<\u002Fp>\n         <div class=\"s-gates\"><span class=\"lbl\">${esc(t(COPY.gatesLabel))}<\u002Fspan><span class=\"art\">${esc(t(s.gatesOver))}<\u002Fspan><\u002Fdiv>\n       <\u002Fdiv>`;\n    grid.appendChild(el);\n  });\n  // organic \"more skills are landing\" affordance (not a skill slot)\n  const more = document.createElement(\"div\");\n  more.className = \"srow more\";\n  more.innerHTML =\n    `<div class=\"more-inner\"><span class=\"mk\" aria-hidden=\"true\"><\u002Fspan><span>${esc(t(COPY.moreSkills))}<\u002Fspan><span class=\"mono\">// ${esc(t(COPY.moreHint))}<\u002Fspan><\u002Fdiv>`;\n  grid.appendChild(more);\n}\n\n/* ---- how it works ---- */\nfunction renderHow(){\n  const grid = $(\"#howGrid\"); grid.innerHTML = \"\";\n  WORKFLOW.forEach((w,i)=>{\n    const el = document.createElement(\"article\");\n    el.className = \"flow\";\n    let extra = \"\";\n    if(i===0){\n      // one body -> multiple skins, fan rendered from HOSTS (data-driven)\n      const skins = HOSTS.map(h=>`<span class=\"skin\">${escapeId(h.name)}<\u002Fspan>`).join(\"\");\n      extra = `<div class=\"fan\"><span class=\"core\">${esc(t(COPY.fanCore))}<\u002Fspan><div class=\"skins\">${skins}<\u002Fdiv><\u002Fdiv>`;\n    }\n    el.innerHTML = `<div class=\"ft\">${escapeId(w.tag)}<\u002Fdiv><p>${esc(t(w.body))}<\u002Fp>${extra}`;\n    grid.appendChild(el);\n  });\n  // adversary sequence: designed -> red-teamed -> executed -> reviewed\n  const pipe = $(\"#pipe\"); pipe.innerHTML = \"\";\n  STEPS.forEach((s,i)=>{\n    if(i>0){ const a=document.createElement(\"span\"); a.className=\"arrow\"; a.setAttribute(\"aria-hidden\",\"true\"); a.textContent=\"→\"; pipe.appendChild(a); }\n    const step = document.createElement(\"span\");\n    step.className = \"step\";\n    step.innerHTML = `<span class=\"sn\">0${i+1}<\u002Fspan><span class=\"sl\">${esc(t(s))}<\u002Fspan>`;\n    pipe.appendChild(step);\n  });\n  const tail = document.createElement(\"span\");\n  tail.className = \"tail\";\n  tail.textContent = \"— \" + t(COPY.pipeIntro);\n  pipe.appendChild(tail);\n}\n\n/* ---- hosts: data-driven (any count) ---- */\nfunction renderHosts(){\n  const grid = $(\"#hostGrid\"); grid.innerHTML = \"\";\n  HOSTS.forEach((h,i)=>{\n    const el = document.createElement(\"a\");\n    el.className = \"host\" + (h.fallback ? \" fallback\" : \"\");\n    el.href = URLS.install; el.target = \"_blank\"; el.rel = \"noopener\";\n    const note = h.note ? `<span class=\"hnote\">${esc(t(h.note))}<\u002Fspan>` : \"\";\n    el.innerHTML = `<span class=\"hi\">${String(i+1).padStart(2,\"0\")}<\u002Fspan><span class=\"hname\">${escapeId(h.name)}<\u002Fspan>${note}`;\n    grid.appendChild(el);\n  });\n}\n/* ============================================================\n   LANGUAGE STATE\n   ============================================================ */\nfunction setLang(lang, persist){\n  if(!LANGS.includes(lang)) lang = \"en\";\n  LANG = lang;\n  document.documentElement.lang = lang;\n  $$(\"#langToggle button\").forEach(b=>{\n    b.setAttribute(\"aria-pressed\", String(b.dataset.lang === lang));\n  });\n  $(\"#langToggle\").setAttribute(\"aria-label\", t(COPY.langAria));\n  renderAll();\n  if(persist){ try{ localStorage.setItem(\"techne-lang\", lang); }catch(e){} }\n}\nfunction renderAll(){\n  renderStatic();\n  renderPrinciples();\n  renderSkills();\n  renderHow();\n  renderHosts();\n}\n$(\"#langToggle\").addEventListener(\"click\", e=>{\n  const b = e.target.closest(\"button[data-lang]\");\n  if(b) setLang(b.dataset.lang, true);\n});\n\n/* ============================================================\n   HELPERS\n   ============================================================ */\nfunction esc(s){return String(s).replace(/[&<>]/g,c=>({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\"}[c]));}\nconst escapeId = esc; // identifiers are escaped but never translated\nfunction initials(name){\n  // first significant glyph(s) for the host avatar\n  const cleaned = name.replace(/[^A-Za-z0-9]/g,\"\");\n  return esc((cleaned[0]||\"·\").toUpperCase());\n}\n\n/* ============================================================\n   INIT — default EN; first visit only: zh if navigator says so.\n   ============================================================ */\n(function init(){\n  let start = \"en\";\n  try{\n    const saved = localStorage.getItem(\"techne-lang\");\n    if(saved && LANGS.includes(saved)) start = saved;\n    else if((navigator.language||\"\").toLowerCase().startsWith(\"zh\")) start = \"zh\";\n  }catch(e){\n    if((navigator.language||\"\").toLowerCase().startsWith(\"zh\")) start = \"zh\";\n  }\n  setLang(start, false);\n  firstPaint = false;                  // subsequent renders (toggle) are instant\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
