<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>techne viz</title>
    <style>
      :root {
        color-scheme: light;
        --sans: "Hanken Grotesk", "Avenir Next", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace;
        --bg: oklch(0.984 0.003 240);
        --panel: oklch(1 0 0);
        --panel-2: oklch(0.985 0.004 240);
        --text: oklch(0.27 0.018 252);
        --muted: oklch(0.52 0.014 252);
        --quiet: oklch(0.66 0.012 252);
        --line: oklch(0.918 0.005 252);
        --line-soft: oklch(0.95 0.004 252);
        --hover: oklch(0.965 0.004 252);
        --accent: oklch(0.58 0.084 172);
        --accent-ink: oklch(0.46 0.09 172);
        --accent-soft: oklch(0.965 0.03 172);
        --accent-line: oklch(0.86 0.05 172);
        --canvas: oklch(1 0 0);
        --grid-dot: oklch(0.90 0.006 252);
        --danger: oklch(0.55 0.18 25);
        --shadow: 0 1px 2px oklch(0.4 0.02 252 / 0.05), 0 12px 32px -12px oklch(0.4 0.04 252 / 0.12);
        --shadow-pop: 0 1px 2px oklch(0.4 0.02 252 / 0.08), 0 18px 40px -14px oklch(0.4 0.04 252 / 0.22);
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: oklch(0.205 0.012 256);
        --panel: oklch(0.235 0.013 256);
        --panel-2: oklch(0.19 0.012 256);
        --text: oklch(0.93 0.01 252);
        --muted: oklch(0.70 0.012 252);
        --quiet: oklch(0.56 0.012 252);
        --line: oklch(0.31 0.012 256);
        --line-soft: oklch(0.27 0.012 256);
        --hover: oklch(0.275 0.014 256);
        --accent: oklch(0.74 0.10 172);
        --accent-ink: oklch(0.80 0.10 172);
        --accent-soft: oklch(0.30 0.04 172);
        --accent-line: oklch(0.42 0.06 172);
        --canvas: oklch(0.235 0.013 256);
        --grid-dot: oklch(0.31 0.012 256);
        --danger: oklch(0.70 0.16 25);
        --shadow: 0 1px 2px oklch(0 0 0 / 0.3), 0 16px 40px -16px oklch(0 0 0 / 0.55);
        --shadow-pop: 0 1px 2px oklch(0 0 0 / 0.4), 0 22px 50px -16px oklch(0 0 0 / 0.7);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 var(--sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        transition: background 150ms ease, border-color 150ms ease, color 150ms ease, transform 120ms ease;
      }

      button:hover {
        background: var(--hover);
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .app {
        display: grid;
        grid-template-columns: 288px minmax(0, 1fr);
        height: 100vh;
      }

      .sidebar {
        display: flex;
        min-height: 0;
        flex-direction: column;
        border-right: 1px solid var(--line);
        background: var(--bg);
      }

      .brand {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        padding: 22px 22px 18px;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        color: var(--accent);
      }

      .brand-title {
        color: var(--text);
        font-family: var(--mono);
        font-size: 13.5px;
        font-weight: 650;
        letter-spacing: 0.055em;
      }

      .brand-subtitle {
        margin-top: 2px;
        color: var(--quiet);
        font-family: var(--mono);
        font-size: 11px;
      }

      .diagram-list {
        min-height: 0;
        overflow: auto;
        padding: 4px 14px 16px;
      }

      .diagram-list::-webkit-scrollbar {
        width: 9px;
      }

      .diagram-list::-webkit-scrollbar-thumb {
        border: 3px solid var(--bg);
        border-radius: 9px;
        background: var(--line);
      }

      .diagram-item {
        position: relative;
        display: block;
        width: 100%;
        height: auto;
        margin: 0 0 3px;
        padding: 12px 13px 12px 14px;
        text-align: left;
        border-radius: 11px;
        border: 1px solid transparent;
        background: transparent;
      }

      .diagram-item[aria-selected="true"] {
        border-color: var(--accent-line);
        background: var(--accent-soft);
      }

      .diagram-item[aria-selected="true"]::before {
        content: "";
        position: absolute;
        left: 0;
        top: 14px;
        bottom: 14px;
        width: 2.5px;
        border-radius: 3px;
        background: var(--accent);
      }

      .diagram-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.3;
        letter-spacing: -0.005em;
      }

      .diagram-detail {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-top: 9px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
      }

      .badge {
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--panel-2);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.02em;
        padding: 2.5px 7px;
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: var(--bg);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 68px;
        padding: 16px 22px 15px;
        border-bottom: 1px solid var(--line);
        background: var(--bg);
      }

      .current-title {
        min-width: 0;
        flex: 1;
      }

      .current-title strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-size: 17px;
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .current-title span {
        display: block;
        margin-top: 3px;
        color: var(--quiet);
        font-family: var(--mono);
        font-size: 11.5px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
        gap: 2px;
      }

      .actions button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 34px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 12.5px;
        font-weight: 550;
      }

      .actions button:hover {
        color: var(--text);
      }

      .actions svg {
        width: 15px;
        height: 15px;
        flex: none;
      }

      #theme-button {
        width: 34px;
        padding: 0;
        justify-content: center;
      }

      .canvas-shell {
        position: relative;
        min-height: 0;
        padding: 16px;
        overflow: hidden;
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 360px;
        overflow: hidden;
        cursor: grab;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background-color: var(--canvas);
        background-image: radial-gradient(var(--grid-dot) 1.1px, transparent 1.1px);
        background-size: 26px 26px;
        box-shadow: var(--shadow);
      }

      .canvas:active {
        cursor: grabbing;
      }

      .canvas-inner {
        width: 100%;
        height: 100%;
        min-height: 360px;
      }

      .canvas svg {
        display: block;
        width: 100%;
        height: 100%;
        max-width: none !important;
      }

      .empty,
      .error {
        display: grid;
        min-height: 320px;
        place-items: center;
        padding: 24px;
        color: var(--muted);
        text-align: center;
        font-family: var(--mono);
        font-size: 12px;
      }

      .error {
        color: var(--danger);
        white-space: pre-wrap;
      }

      .footer {
        display: flex;
        align-items: center;
        gap: 0;
        padding: 13px 22px;
        border-top: 1px solid var(--line);
        overflow: hidden;
        background: var(--bg);
      }

      .meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0;
        flex: 1;
        min-width: 0;
      }

      .meta-pill {
        position: relative;
        overflow: hidden;
        max-width: 320px;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        padding: 0 16px;
      }

      .meta-pill:first-child {
        padding-left: 0;
      }

      .meta-pill + .meta-pill::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        width: 1px;
        height: 13px;
        transform: translateY(-50%);
        background: var(--line);
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 16px;
        padding-left: 18px;
        flex: none;
        border-left: 1px solid var(--line);
        color: var(--muted);
        font-size: 11.5px;
      }

      .legend-line {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .legend-line::before {
        content: "";
        width: 26px;
        border-top: 1.8px solid currentColor;
        border-radius: 999px;
      }

      .legend-line.dashed::before {
        border-top-style: dashed;
      }

      .status {
        position: fixed;
        left: 50%;
        bottom: 30px;
        max-width: min(360px, calc(100vw - 28px));
        transform: translate(-50%, 16px);
        border-radius: 9px;
        background: var(--text);
        box-shadow: var(--shadow-pop);
        color: var(--panel);
        font-size: 12.5px;
        font-weight: 550;
        opacity: 0;
        padding: 9px 16px;
        pointer-events: none;
        transition: opacity 250ms ease, transform 250ms cubic-bezier(0.2, 0.8, 0.2, 1);
        z-index: 50;
      }

      .status.visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .app {
          grid-template-columns: minmax(0, 1fr);
          width: 100%;
          max-width: 100vw;
          height: auto;
          min-height: 100vh;
          overflow-x: hidden;
        }

        .main,
        .sidebar,
        .topbar,
        .footer,
        .canvas-shell {
          min-width: 0;
          width: 100%;
          max-width: 100%;
        }

        .sidebar {
          max-height: 250px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .main {
          min-height: 640px;
        }

        .topbar,
        .footer {
          display: block;
          align-items: start;
        }

        .actions {
          justify-content: flex-start;
          margin-top: 12px;
        }

        .actions button {
          height: 32px;
          font-size: 12px;
        }

        .actions button span {
          display: none;
        }

        .actions button {
          width: 34px;
          padding: 0;
          justify-content: center;
        }

        .legend {
          margin-top: 10px;
          padding-left: 0;
          border-left: 0;
        }
      }
    </style>
  </head>

    <script>
      window.TECHNE_VIZ_DATA = __TECHNE_VIEWER_DATA__;
    </script>
    <script>
      (() => {
        const data = window.TECHNE_VIZ_DATA || { diagrams: [] };
        const diagrams = Array.isArray(data.diagrams) ? data.diagrams : [];
        const listEl = document.getElementById("diagram-list");
        const canvasEl = document.getElementById("canvas");
        const titleEl = document.getElementById("current-title");
        const subtitleEl = document.getElementById("current-subtitle");
        const countEl = document.getElementById("diagram-count");
        const metaEl = document.getElementById("meta");
        const themeButton = document.getElementById("theme-button");
        const copyButton = document.getElementById("copy-button");
        const liveButton = document.getElementById("live-button");
        const exportButton = document.getElementById("export-button");
        const fitButton = document.getElementById("fit-button");
        const statusEl = document.getElementById("status");
        const storageKey = "techne-viz-theme";
        let selectedIndex = 0;
        let panZoom = null;
        let statusTimer = null;
        let activeTheme = "light";

        function currentDiagram() {
          return diagrams[selectedIndex] || null;
        }

        function setStatus(message) {
          window.clearTimeout(statusTimer);
          statusEl.textContent = message;
          statusEl.classList.add("visible");
          statusTimer = window.setTimeout(() => statusEl.classList.remove("visible"), 2200);
        }

        function getStoredTheme() {
          try {
            return localStorage.getItem(storageKey) === "dark" ? "dark" : "light";
          } catch {
            return activeTheme;
          }
        }

        function saveTheme(theme) {
          try {
            localStorage.setItem(storageKey, theme);
          } catch {
            // Some file:// or private contexts block storage; theme still works for the session.
          }
        }

        function getTheme() {
          return activeTheme;
        }

        function setTheme(theme) {
          activeTheme = theme === "dark" ? "dark" : "light";
          document.body.dataset.theme = activeTheme;
          themeButton.innerHTML = activeTheme === "dark" ? sunIcon() : moonIcon();
          themeButton.title = activeTheme === "dark" ? "Switch to light theme" : "Switch to dark theme";
        }

        function sunIcon() {
          return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="M4 12H2" /><path d="M22 12h-2" /><path d="m5 5 1.5 1.5" /><path d="m17.5 17.5 1.5 1.5" /><path d="m19 5-1.5 1.5" /><path d="m6.5 17.5-1.5 1.5" /></svg>';
        }

        function moonIcon() {
          return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.2 6.2 0 0 0 10.5 10.5Z" /></svg>';
        }

        function getMermaidType(item) {
          return item.type || "flowchart";
        }

        function getDiagramKind(item) {
          if (item.diagramKind) return item.diagramKind;
          const mermaidType = getMermaidType(item);
          if (mermaidType === "flowchart" || mermaidType === "graph") return "architecture";
          if (mermaidType === "sequenceDiagram") return "interaction";
          if (mermaidType === "erDiagram") return "data-model";
          if (mermaidType === "stateDiagram-v2" || mermaidType === "stateDiagram") return "state-model";
          if (mermaidType === "classDiagram") return "type-structure";
          return "unknown";
        }

        function renderList() {
          listEl.innerHTML = "";
          countEl.textContent = `${diagrams.length} ${diagrams.length === 1 ? "diagram" : "diagrams"}`;
          diagrams.forEach((item, index) => {
            const diagramKind = getDiagramKind(item);
            const mermaidType = getMermaidType(item);
            const button = document.createElement("button");
            button.type = "button";
            button.className = "diagram-item";
            button.setAttribute("aria-selected", String(index === selectedIndex));
            button.innerHTML = `
              <div class="diagram-title">${escapeHtml(item.title || item.file || "Untitled")}</div>
              <div class="diagram-detail">
                <span class="badge">${escapeHtml(diagramKind)}</span>
                <span>${escapeHtml(mermaidType)}</span>
              </div>
            `;
            button.addEventListener("click", () => {
              selectedIndex = index;
              renderList();
              renderSelected({ preserveView: false });
            });
            listEl.appendChild(button);
          });
        }

        function renderMeta(item) {
          const sourceFiles = Array.isArray(item.sourceFiles) ? item.sourceFiles : [];
          const values = [
            ["kind", getDiagramKind(item)],
            ["shape", item.shape],
            ["mermaid", getMermaidType(item)],
            ["coverage", formatCoverage(item.coverage)],
            ["nodes", item.nodeCount],
            ["generated", formatDate(item.generatedAt)],
            ["sources", sourceFiles.length ? sourceFiles.join(", ") : null],
            ["file", item.file],
          ];
          metaEl.innerHTML = values
            .filter((entry) => entry[1] !== undefined && entry[1] !== null && entry[1] !== "")
            .map(([label, value]) => `<span class="meta-pill">${escapeHtml(label)}: ${escapeHtml(String(value))}</span>`)
            .join("");
        }

        function formatCoverage(value) {
          if (!value) return null;
          if (typeof value === "string") return value;
          if (typeof value !== "object") return String(value);
          const ratio = typeof value.ratio === "number" ? `${Math.round(value.ratio * 100)}%` : null;
          const parts = [];
          if (typeof value.symbolVerified === "number") parts.push(`symbol ${value.symbolVerified}`);
          if (typeof value.pathVerified === "number") parts.push(`path ${value.pathVerified}`);
          if (typeof value.inferred === "number") parts.push(`inferred ${value.inferred}`);
          if (typeof value.uncovered === "number" && value.uncovered > 0) parts.push(`uncovered ${value.uncovered}`);
          return [ratio, parts.join(" / ")].filter(Boolean).join(" - ");
        }

        function formatDate(value) {
          if (!value) return null;
          const date = new Date(value);
          return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
        }

        function configureMermaid() {
          const theme = getTheme();
          mermaid.initialize({
            startOnLoad: false,
            securityLevel: "strict",
            theme: theme === "dark" ? "dark" : "default",
            flowchart: {
              htmlLabels: false,
              useMaxWidth: true,
            },
          });
        }

        async function renderSelected(options = {}) {
          const item = currentDiagram();
          if (!item) {
            setEmpty();
            return;
          }
          const savedView = options.preserveView ? getPanState() : null;
          destroyPanZoom();
          configureMermaid();
          titleEl.textContent = item.title || item.file || "Untitled diagram";
          subtitleEl.textContent = `${getDiagramKind(item)} / ${getMermaidType(item)}`;
          renderMeta(item);
          canvasEl.innerHTML = "";
          try {
            const id = `techne-viz-${selectedIndex}-${Date.now()}`;
            const result = await mermaid.render(id, item.source || "");
            canvasEl.innerHTML = result.svg;
            const svg = canvasEl.querySelector("svg");
            if (!svg) throw new Error("Mermaid did not return an SVG");
            prepareSvg(svg);
            panZoom = svgPanZoom(svg, {
              zoomEnabled: true,
              controlIconsEnabled: false,
              dblClickZoomEnabled: true,
              mouseWheelZoomEnabled: true,
              preventMouseEventsDefault: true,
              fit: true,
              center: true,
              minZoom: 0.2,
              maxZoom: 20,
            });
            if (savedView) {
              panZoom.zoom(savedView.zoom);
              panZoom.pan(savedView.pan);
            } else {
              fitDiagram();
            }
          } catch (error) {
            canvasEl.innerHTML = `<div class="error">${escapeHtml(error && error.message ? error.message : String(error))}</div>`;
          }
        }

        function prepareSvg(svg) {
          svg.dataset.techneViewBox = ensureViewBox(svg);
          svg.removeAttribute("height");
          svg.removeAttribute("width");
          svg.style.width = "100%";
          svg.style.height = "100%";
          svg.style.maxWidth = "none";
          svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
          svg.setAttribute("role", "img");
          svg.setAttribute("aria-label", titleEl.textContent || "Diagram");
        }

        function ensureViewBox(svg) {
          const existing = svg.getAttribute("viewBox");
          if (existing) return existing;
          try {
            const box = svg.getBBox();
            if (box && box.width > 0 && box.height > 0) {
              const padding = 28;
              const x = box.x - padding;
              const y = box.y - padding;
              const width = box.width + padding * 2;
              const height = box.height + padding * 2;
              const viewBox = `${x} ${y} ${width} ${height}`;
              svg.setAttribute("viewBox", viewBox);
              return viewBox;
            }
          } catch {
            // Browser rendering can report no bbox for invalid diagrams; fall back below.
          }
          const width = parseFloat(svg.getAttribute("width") || "1200");
          const height = parseFloat(svg.getAttribute("height") || "800");
          const viewBox = `0 0 ${Math.max(1, width)} ${Math.max(1, height)}`;
          svg.setAttribute("viewBox", viewBox);
          return viewBox;
        }

        function destroyPanZoom() {
          if (panZoom) {
            panZoom.destroy();
            panZoom = null;
          }
        }

        function getPanState() {
          if (!panZoom) return null;
          return {
            zoom: panZoom.getZoom(),
            pan: panZoom.getPan(),
          };
        }

        function fitDiagram() {
          if (!panZoom) return;
          panZoom.resize();
          panZoom.fit();
          panZoom.center();
        }

        function setEmpty() {
          destroyPanZoom();
          countEl.textContent = "0 diagrams";
          titleEl.textContent = "No diagrams found";
          subtitleEl.textContent = ".techne/viz/.index.json has no diagrams";
          metaEl.innerHTML = "";
          canvasEl.innerHTML = '<div class="empty">No diagrams found in the generated index.</div>';
          for (const button of [copyButton, liveButton, exportButton, fitButton]) {
            button.disabled = true;
          }
        }

        async function copySource() {
          const item = currentDiagram();
          if (!item) return;
          try {
            await navigator.clipboard.writeText(item.source || "");
          } catch {
            const textarea = document.createElement("textarea");
            textarea.value = item.source || "";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
          }
          setStatus("Mermaid source copied");
        }

        function openMermaidLive() {
          const item = currentDiagram();
          if (!item) return;
          const encoded = toBase64(item.source || "");
          const url = ["h", "ttps://mermaid.live/edit#base64:"].join("") + encoded;
          window.open(url, "_blank", "noopener,noreferrer");
        }

        function toBase64(value) {
          const bytes = new TextEncoder().encode(value);
          let binary = "";
          for (const byte of bytes) binary += String.fromCharCode(byte);
          return btoa(binary);
        }

        async function exportPng() {
          const item = currentDiagram();
          const svg = canvasEl.querySelector("svg");
          if (!item || !svg) return;
          try {
            const clone = cloneForExport(svg);
            const dimensions = getSvgDimensions(svg);
            clone.setAttribute("width", String(dimensions.width));
            clone.setAttribute("height", String(dimensions.height));
            inlineStyles(svg, clone);
            replaceForeignObjects(svg, clone);
            const source = new XMLSerializer().serializeToString(clone);
            const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const image = await loadImage(url);
            URL.revokeObjectURL(url);
            const canvas = document.createElement("canvas");
            canvas.width = dimensions.width;
            canvas.height = dimensions.height;
            const context = canvas.getContext("2d");
            context.fillStyle = getComputedStyle(document.body).getPropertyValue("--panel").trim() || "#ffffff";
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.drawImage(image, 0, 0, dimensions.width, dimensions.height);
            canvas.toBlob((pngBlob) => {
              if (!pngBlob) {
                setStatus("PNG export failed");
                return;
              }
              const name = `${item.exportName || "diagram"}.png`;
              downloadBlob(pngBlob, name);
              setStatus(`Downloaded ${name}`);
            }, "image/png");
          } catch (error) {
            setStatus(error && error.message ? error.message : String(error));
          }
        }

        function cloneForExport(svg) {
          const clone = svg.cloneNode(true);
          const viewport = clone.querySelector(".svg-pan-zoom_viewport");
          if (viewport) viewport.removeAttribute("transform");
          const viewBox = getExportViewBox(svg);
          if (viewBox) clone.setAttribute("viewBox", viewBox);
          clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          return clone;
        }

        function replaceForeignObjects(sourceSvg, cloneSvg) {
          const namespace = "http://www.w3.org/2000/svg";
          const sourceObjects = [...sourceSvg.querySelectorAll("foreignObject")];
          const cloneObjects = [...cloneSvg.querySelectorAll("foreignObject")];
          cloneObjects.forEach((foreignObject, index) => {
            const sourceObject = sourceObjects[index] || foreignObject;
            const sourceLabel = sourceObject.querySelector(".nodeLabel") || sourceObject;
            const computed = getComputedStyle(sourceLabel);
            const text = normalizeLabelText(sourceObject.textContent || "");
            const x = Number(foreignObject.getAttribute("x") || 0);
            const y = Number(foreignObject.getAttribute("y") || 0);
            const width = Number(foreignObject.getAttribute("width") || 0);
            const height = Number(foreignObject.getAttribute("height") || 24);
            const textNode = document.createElementNS(namespace, "text");
            textNode.setAttribute("x", String(x + width / 2));
            textNode.setAttribute("y", String(y + height / 2));
            textNode.setAttribute("text-anchor", "middle");
            textNode.setAttribute("dominant-baseline", "middle");
            textNode.style.fontFamily = computed.fontFamily || "Arial, sans-serif";
            textNode.style.fontSize = computed.fontSize || "14px";
            textNode.style.fontWeight = computed.fontWeight || "400";
            textNode.style.fill = computed.color || "currentColor";
            textNode.textContent = text;
            foreignObject.replaceWith(textNode);
          });
        }

        function normalizeLabelText(value) {
          return value.replace(/\s+/g, " ").trim();
        }

        function getSvgDimensions(svg) {
          const rect = svg.getBoundingClientRect();
          const viewBox = parseViewBox(getExportViewBox(svg));
          const width = Math.ceil(viewBox.width || Number(svg.getAttribute("width")) || rect.width || 1200);
          const height = Math.ceil(viewBox.height || Number(svg.getAttribute("height")) || rect.height || 800);
          return {
            width: Math.max(1, width),
            height: Math.max(1, height),
          };
        }

        function getExportViewBox(svg) {
          return svg.dataset.techneViewBox || svg.getAttribute("viewBox") || "";
        }

        function parseViewBox(value) {
          if (!value) return {};
          const parts = value.trim().split(/[\s,]+/).map(Number);
          return parts.length === 4 && parts.every(Number.isFinite) ? { width: parts[2], height: parts[3] } : {};
        }

        function inlineStyles(sourceSvg, cloneSvg) {
          const properties = [
            "font-family",
            "font-size",
            "font-weight",
            "fill",
            "stroke",
            "stroke-width",
            "stroke-dasharray",
            "stroke-linecap",
            "stroke-linejoin",
            "color",
            "opacity",
            "text-anchor",
            "dominant-baseline",
          ];
          const sourceNodes = [sourceSvg, ...sourceSvg.querySelectorAll("*")];
          const cloneNodes = [cloneSvg, ...cloneSvg.querySelectorAll("*")];
          sourceNodes.forEach((node, index) => {
            const target = cloneNodes[index];
            if (!target) return;
            const computed = getComputedStyle(node);
            for (const property of properties) {
              const value = computed.getPropertyValue(property);
              if (value) target.style.setProperty(property, value);
            }
          });
        }

        function loadImage(url) {
          return new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => resolve(image);
            image.onerror = () => reject(new Error("Could not load serialized SVG for PNG export"));
            image.src = url;
          });
        }

        function downloadBlob(blob, name) {
          const link = document.createElement("a");
          const url = URL.createObjectURL(blob);
          link.href = url;
          link.download = name;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        themeButton.addEventListener("click", () => {
          const next = getTheme() === "dark" ? "light" : "dark";
          saveTheme(next);
          setTheme(next);
          renderSelected({ preserveView: true });
        });
        copyButton.addEventListener("click", copySource);
        liveButton.addEventListener("click", openMermaidLive);
        exportButton.addEventListener("click", exportPng);
        fitButton.addEventListener("click", fitDiagram);
        window.addEventListener("resize", () => {
          if (panZoom) {
            panZoom.resize();
          }
        });

        setTheme(getStoredTheme());
        if (diagrams.length) {
          renderList();
          renderSelected({ preserveView: false });
        } else {
          setEmpty();
        }
      })();
    </script>
  </body>
</html>
