<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>techne viz</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --panel-soft: #f9fafb;
        --text: #17181c;
        --muted: #68707d;
        --line: #dde1e7;
        --line-strong: #c4cad3;
        --accent: #0f766e;
        --accent-soft: #d9f2ee;
        --danger: #b42318;
        --shadow: 0 14px 36px rgba(22, 28, 40, 0.09);
        --radius: 8px;
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: #16181d;
        --panel: #20232a;
        --panel-soft: #191c22;
        --text: #f3f5f7;
        --muted: #a4adba;
        --line: #343944;
        --line-strong: #505766;
        --accent: #5eead4;
        --accent-soft: rgba(45, 212, 191, 0.15);
        --danger: #f97066;
        --shadow: 0 16px 42px rgba(0, 0, 0, 0.32);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        height: 34px;
        padding: 0 10px;
      }

      button:hover {
        border-color: var(--line-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
        height: 100vh;
      }

      .sidebar {
        display: flex;
        min-height: 0;
        flex-direction: column;
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      .brand {
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--line);
      }

      .brand-title {
        font-size: 18px;
        font-weight: 700;
      }

      .brand-subtitle {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .diagram-list {
        min-height: 0;
        overflow: auto;
        padding: 10px;
      }

      .diagram-item {
        display: block;
        width: 100%;
        height: auto;
        margin: 0 0 8px;
        padding: 10px;
        text-align: left;
        border-radius: var(--radius);
        background: transparent;
      }

      .diagram-item[aria-selected="true"] {
        border-color: rgba(15, 118, 110, 0.45);
        background: var(--accent-soft);
      }

      .diagram-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 650;
      }

      .diagram-detail {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 7px;
        color: var(--muted);
        font-size: 12px;
      }

      .badge {
        max-width: 116px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        padding: 2px 7px;
        text-transform: uppercase;
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-width: 0;
        min-height: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 62px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
      }

      .current-title {
        min-width: 0;
      }

      .current-title strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 16px;
      }

      .current-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .canvas-shell {
        min-height: 0;
        padding: 16px;
        overflow: hidden;
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 360px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .canvas-inner {
        width: 100%;
        height: 100%;
        min-height: 360px;
      }

      .canvas svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .empty,
      .error {
        display: grid;
        min-height: 320px;
        place-items: center;
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: var(--danger);
        white-space: pre-wrap;
      }

      .footer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding: 12px 16px 14px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
      }

      .meta-pill {
        overflow: hidden;
        max-width: 360px;
        text-overflow: ellipsis;
        white-space: nowrap;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        padding: 4px 9px;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .legend-line {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .legend-line::before {
        content: "";
        width: 28px;
        border-top: 2px solid var(--text);
      }

      .legend-line.dashed::before {
        border-top-style: dashed;
      }

      .status {
        position: fixed;
        right: 14px;
        bottom: 14px;
        max-width: min(360px, calc(100vw - 28px));
        transform: translateY(16px);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        color: var(--text);
        opacity: 0;
        padding: 10px 12px;
        pointer-events: none;
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .status.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .app {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }

        .sidebar {
          max-height: 260px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .main {
          min-height: 640px;
        }

        .topbar,
        .footer {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .footer {
          display: block;
        }

        .legend {
          margin-top: 10px;
        }
      }
    </style>
  </head>
  <body data-theme="light">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">techne viz</div>
          <div id="diagram-count" class="brand-subtitle">viz</div>
        </div>
        <div id="diagram-list" class="diagram-list" aria-label="Diagrams"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="current-title">
            <strong id="current-title">No diagram selected</strong>
            <span id="current-subtitle"></span>
          </div>
          <div class="actions">
            <button id="theme-button" type="button">Dark</button>
            <button id="copy-button" type="button">Copy Source</button>
            <button id="live-button" type="button">Mermaid Live</button>
            <button id="export-button" type="button">Export PNG</button>
            <button id="fit-button" type="button">Fit</button>
          </div>
        </header>

        <section class="canvas-shell">
          <div class="canvas">
            <div id="canvas" class="canvas-inner"></div>
          </div>
        </section>

        <footer class="footer">
          <div id="meta" class="meta"></div>
          <div class="legend" aria-label="Provenance legend">
            <span class="legend-line">read from code</span>
            <span class="legend-line dashed">inferred</span>
          </div>
        </footer>
      </main>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <script>

    </script>
    <script>
__TECHNE_SVG_PAN_ZOOM_JS__
    </script>
    <script>
      window.TECHNE_VIZ_DATA = __TECHNE_VIEWER_DATA__;
    </script>
    <script>
      (() => {
        const data = window.TECHNE_VIZ_DATA || { diagrams: [] };
        const diagrams = Array.isArray(data.diagrams) ? data.diagrams : [];
        const listEl = document.getElementById("diagram-list");
        const canvasEl = document.getElementById("canvas");
        const titleEl = document.getElementById("current-title");
        const subtitleEl = document.getElementById("current-subtitle");
        const countEl = document.getElementById("diagram-count");
        const metaEl = document.getElementById("meta");
        const themeButton = document.getElementById("theme-button");
        const copyButton = document.getElementById("copy-button");
        const liveButton = document.getElementById("live-button");
        const exportButton = document.getElementById("export-button");
        const fitButton = document.getElementById("fit-button");
        const statusEl = document.getElementById("status");
        const storageKey = "techne-viz-theme";
        let selectedIndex = 0;
        let panZoom = null;
        let statusTimer = null;

        function currentDiagram() {
          return diagrams[selectedIndex] || null;
        }

        function setStatus(message) {
          window.clearTimeout(statusTimer);
          statusEl.textContent = message;
          statusEl.classList.add("visible");
          statusTimer = window.setTimeout(() => statusEl.classList.remove("visible"), 2200);
        }

        function getTheme() {
          return localStorage.getItem(storageKey) === "dark" ? "dark" : "light";
        }

        function setTheme(theme) {
          document.body.dataset.theme = theme;
          themeButton.textContent = theme === "dark" ? "Light" : "Dark";
        }

        function renderList() {
          listEl.innerHTML = "";
          countEl.textContent = `${diagrams.length} ${diagrams.length === 1 ? "diagram" : "diagrams"}`;
          diagrams.forEach((item, index) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "diagram-item";
            button.setAttribute("aria-selected", String(index === selectedIndex));
            button.innerHTML = `
              <div class="diagram-title">${escapeHtml(item.title || item.file || "Untitled")}</div>
              <div class="diagram-detail">
                <span class="badge">${escapeHtml(item.shape || "shape")}</span>
                <span>${escapeHtml(item.type || "flowchart")}</span>
              </div>
            `;
            button.addEventListener("click", () => {
              selectedIndex = index;
              renderList();
              renderSelected({ preserveView: false });
            });
            listEl.appendChild(button);
          });
        }

        function renderMeta(item) {
          const sourceFiles = Array.isArray(item.sourceFiles) ? item.sourceFiles : [];
          const values = [
            ["shape", item.shape],
            ["type", item.type],
            ["coverage", item.coverage],
            ["nodes", item.nodeCount],
            ["generated", formatDate(item.generatedAt)],
            ["sources", sourceFiles.length ? sourceFiles.join(", ") : null],
            ["file", item.file],
          ];
          metaEl.innerHTML = values
            .filter((entry) => entry[1] !== undefined && entry[1] !== null && entry[1] !== "")
            .map(([label, value]) => `<span class="meta-pill">${escapeHtml(label)}: ${escapeHtml(String(value))}</span>`)
            .join("");
        }

        function formatDate(value) {
          if (!value) return null;
          const date = new Date(value);
          return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
        }

        function configureMermaid() {
          const theme = getTheme();
          mermaid.initialize({
            startOnLoad: false,
            securityLevel: "strict",
            theme: theme === "dark" ? "dark" : "default",
            flowchart: {
              htmlLabels: false,
              useMaxWidth: true,
            },
          });
        }

        async function renderSelected(options = {}) {
          const item = currentDiagram();
          if (!item) {
            setEmpty();
            return;
          }
          const savedView = options.preserveView ? getPanState() : null;
          destroyPanZoom();
          configureMermaid();
          titleEl.textContent = item.title || item.file || "Untitled diagram";
          subtitleEl.textContent = `${item.shape || "unknown"} / ${item.type || "flowchart"}`;
          renderMeta(item);
          canvasEl.innerHTML = "";
          try {
            const id = `techne-viz-${selectedIndex}-${Date.now()}`;
            const result = await mermaid.render(id, item.source || "");
            canvasEl.innerHTML = result.svg;
            const svg = canvasEl.querySelector("svg");
            if (!svg) throw new Error("Mermaid did not return an SVG");
            prepareSvg(svg);
            panZoom = svgPanZoom(svg, {
              zoomEnabled: true,
              controlIconsEnabled: false,
              dblClickZoomEnabled: true,
              mouseWheelZoomEnabled: true,
              preventMouseEventsDefault: true,
              fit: true,
              center: true,
              minZoom: 0.2,
              maxZoom: 20,
            });
            if (savedView) {
              panZoom.zoom(savedView.zoom);
              panZoom.pan(savedView.pan);
            } else {
              fitDiagram();
            }
          } catch (error) {
            canvasEl.innerHTML = `<div class="error">${escapeHtml(error && error.message ? error.message : String(error))}</div>`;
          }
        }

        function prepareSvg(svg) {
          svg.removeAttribute("height");
          svg.removeAttribute("width");
          svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
          svg.setAttribute("role", "img");
          svg.setAttribute("aria-label", titleEl.textContent || "Diagram");
        }

        function destroyPanZoom() {
          if (panZoom) {
            panZoom.destroy();
            panZoom = null;
          }
        }

        function getPanState() {
          if (!panZoom) return null;
          return {
            zoom: panZoom.getZoom(),
            pan: panZoom.getPan(),
          };
        }

        function fitDiagram() {
          if (!panZoom) return;
          panZoom.resize();
          panZoom.fit();
          panZoom.center();
        }

        function setEmpty() {
          destroyPanZoom();
          countEl.textContent = "0 diagrams";
          titleEl.textContent = "No diagrams found";
          subtitleEl.textContent = ".techne/viz/.index.json has no diagrams";
          metaEl.innerHTML = "";
          canvasEl.innerHTML = '<div class="empty">No diagrams found in the generated index.</div>';
          for (const button of [copyButton, liveButton, exportButton, fitButton]) {
            button.disabled = true;
          }
        }

        async function copySource() {
          const item = currentDiagram();
          if (!item) return;
          try {
            await navigator.clipboard.writeText(item.source || "");
          } catch {
            const textarea = document.createElement("textarea");
            textarea.value = item.source || "";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
          }
          setStatus("Mermaid source copied");
        }

        function openMermaidLive() {
          const item = currentDiagram();
          if (!item) return;
          const encoded = toBase64(item.source || "");
          const url = ["h", "ttps://mermaid.live/edit#base64:"].join("") + encoded;
          window.open(url, "_blank", "noopener,noreferrer");
        }

        function toBase64(value) {
          const bytes = new TextEncoder().encode(value);
          let binary = "";
          for (const byte of bytes) binary += String.fromCharCode(byte);
          return btoa(binary);
        }

        async function exportPng() {
          const item = currentDiagram();
          const svg = canvasEl.querySelector("svg");
          if (!item || !svg) return;
          try {
            const clone = cloneForExport(svg);
            const dimensions = getSvgDimensions(svg);
            clone.setAttribute("width", String(dimensions.width));
            clone.setAttribute("height", String(dimensions.height));
            inlineStyles(svg, clone);
            replaceForeignObjects(svg, clone);
            const source = new XMLSerializer().serializeToString(clone);
            const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const image = await loadImage(url);
            URL.revokeObjectURL(url);
            const canvas = document.createElement("canvas");
            canvas.width = dimensions.width;
            canvas.height = dimensions.height;
            const context = canvas.getContext("2d");
            context.fillStyle = getComputedStyle(document.body).getPropertyValue("--panel").trim() || "#ffffff";
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.drawImage(image, 0, 0, dimensions.width, dimensions.height);
            canvas.toBlob((pngBlob) => {
              if (!pngBlob) {
                setStatus("PNG export failed");
                return;
              }
              const name = `${item.exportName || "diagram"}.png`;
              downloadBlob(pngBlob, name);
              setStatus(`Downloaded ${name}`);
            }, "image/png");
          } catch (error) {
            setStatus(error && error.message ? error.message : String(error));
          }
        }

        function cloneForExport(svg) {
          const clone = svg.cloneNode(true);
          const viewport = clone.querySelector(".svg-pan-zoom_viewport");
          if (viewport) viewport.removeAttribute("transform");
          clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          return clone;
        }

        function replaceForeignObjects(sourceSvg, cloneSvg) {
          const namespace = "http://www.w3.org/2000/svg";
          const sourceObjects = [...sourceSvg.querySelectorAll("foreignObject")];
          const cloneObjects = [...cloneSvg.querySelectorAll("foreignObject")];
          cloneObjects.forEach((foreignObject, index) => {
            const sourceObject = sourceObjects[index] || foreignObject;
            const sourceLabel = sourceObject.querySelector(".nodeLabel") || sourceObject;
            const computed = getComputedStyle(sourceLabel);
            const text = normalizeLabelText(sourceObject.textContent || "");
            const x = Number(foreignObject.getAttribute("x") || 0);
            const y = Number(foreignObject.getAttribute("y") || 0);
            const width = Number(foreignObject.getAttribute("width") || 0);
            const height = Number(foreignObject.getAttribute("height") || 24);
            const textNode = document.createElementNS(namespace, "text");
            textNode.setAttribute("x", String(x + width / 2));
            textNode.setAttribute("y", String(y + height / 2));
            textNode.setAttribute("text-anchor", "middle");
            textNode.setAttribute("dominant-baseline", "middle");
            textNode.style.fontFamily = computed.fontFamily || "Arial, sans-serif";
            textNode.style.fontSize = computed.fontSize || "14px";
            textNode.style.fontWeight = computed.fontWeight || "400";
            textNode.style.fill = computed.color || "currentColor";
            textNode.textContent = text;
            foreignObject.replaceWith(textNode);
          });
        }

        function normalizeLabelText(value) {
          return value.replace(/\s+/g, " ").trim();
        }

        function getSvgDimensions(svg) {
          const rect = svg.getBoundingClientRect();
          const viewBox = parseViewBox(svg.getAttribute("viewBox"));
          const width = Math.ceil(viewBox.width || Number(svg.getAttribute("width")) || rect.width || 1200);
          const height = Math.ceil(viewBox.height || Number(svg.getAttribute("height")) || rect.height || 800);
          return {
            width: Math.max(1, width),
            height: Math.max(1, height),
          };
        }

        function parseViewBox(value) {
          if (!value) return {};
          const parts = value.trim().split(/\s+/).map(Number);
          return parts.length === 4 ? { width: parts[2], height: parts[3] } : {};
        }

        function inlineStyles(sourceSvg, cloneSvg) {
          const properties = [
            "font-family",
            "font-size",
            "font-weight",
            "fill",
            "stroke",
            "stroke-width",
            "stroke-dasharray",
            "stroke-linecap",
            "stroke-linejoin",
            "color",
            "opacity",
            "text-anchor",
            "dominant-baseline",
          ];
          const sourceNodes = [sourceSvg, ...sourceSvg.querySelectorAll("*")];
          const cloneNodes = [cloneSvg, ...cloneSvg.querySelectorAll("*")];
          sourceNodes.forEach((node, index) => {
            const target = cloneNodes[index];
            if (!target) return;
            const computed = getComputedStyle(node);
            for (const property of properties) {
              const value = computed.getPropertyValue(property);
              if (value) target.style.setProperty(property, value);
            }
          });
        }

        function loadImage(url) {
          return new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => resolve(image);
            image.onerror = () => reject(new Error("Could not load serialized SVG for PNG export"));
            image.src = url;
          });
        }

        function downloadBlob(blob, name) {
          const link = document.createElement("a");
          const url = URL.createObjectURL(blob);
          link.href = url;
          link.download = name;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        themeButton.addEventListener("click", () => {
          const next = getTheme() === "dark" ? "light" : "dark";
          localStorage.setItem(storageKey, next);
          setTheme(next);
          renderSelected({ preserveView: true });
        });
        copyButton.addEventListener("click", copySource);
        liveButton.addEventListener("click", openMermaidLive);
        exportButton.addEventListener("click", exportPng);
        fitButton.addEventListener("click", fitDiagram);
        window.addEventListener("resize", () => {
          if (panZoom) {
            panZoom.resize();
          }
        });

        setTheme(getTheme());
        if (diagrams.length) {
          renderList();
          renderSelected({ preserveView: false });
        } else {
          setEmpty();
        }
      })();
    </script>
  </body>
</html>
