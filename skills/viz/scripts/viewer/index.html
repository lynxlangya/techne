<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>techne viz</title>
    <style>
      body { margin: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; background: #f8fafc; }
      header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #ffffff; border-bottom: 1px solid #dbe3ef; }
      select { min-width: 260px; padding: 6px 8px; }
      main { padding: 16px; }
      #meta { color: #64748b; margin-bottom: 12px; }
      #diagram { background: #ffffff; border: 1px solid #dbe3ef; padding: 16px; overflow: auto; min-height: 60vh; }
      #error { color: #b91c1c; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <header>
      <strong>techne viz</strong>
      <select id="diagram-select" aria-label="Diagram"></select>
    </header>
    <main>
      <div id="meta"></div>
      <div id="error"></div>
      <div id="diagram"></div>
    </main>
    <script src="./mermaid.min.js"></script>
    <script>
      mermaid.initialize({ startOnLoad: false, securityLevel: "strict" });
      const select = document.getElementById("diagram-select");
      const meta = document.getElementById("meta");
      const diagram = document.getElementById("diagram");
      const error = document.getElementById("error");
      let diagrams = [];

      function extractMermaid(text) {
        const match = text.match(/```(?:mermaid|mmd)\s*\n([\s\S]*?)```/i);
        return (match ? match[1] : text).trim();
      }

      async function renderSelected() {
        const item = diagrams[select.selectedIndex];
        if (!item) return;
        error.textContent = "";
        diagram.innerHTML = "";
        meta.textContent = `${item.shape || "unknown"} · ${item.type || "flowchart"} · ${item.file}`;
        try {
          const response = await fetch(`/diagrams/${encodeURIComponent(item.file)}`);
          const text = await response.text();
          const source = extractMermaid(text);
          const result = await mermaid.render(`viz-${Date.now()}`, source);
          diagram.innerHTML = result.svg;
        } catch (err) {
          error.textContent = err && err.message ? err.message : String(err);
        }
      }

      async function init() {
        const response = await fetch("/api/index");
        const index = await response.json();
        diagrams = index.diagrams || [];
        select.innerHTML = "";
        for (const item of diagrams) {
          const option = document.createElement("option");
          option.textContent = item.title || item.file;
          select.appendChild(option);
        }
        select.addEventListener("change", renderSelected);
        if (diagrams.length) {
          await renderSelected();
        } else {
          meta.textContent = "No diagrams found in .techne/viz/.index.json";
        }
      }

      init();
    </script>
  </body>
</html>
